name = "echo-backup-coordinator"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# === D1 Database ===
[[d1_databases]]
binding = "DB"
database_name = "echo-backup-coordinator"
database_id = "bcf2278f-94bd-48ee-af15-9643064cf631"

# === KV Namespace ===
[[kv_namespaces]]
binding = "CACHE"
id = "8a2b9bd47a374c199c8eacdb575f378c"

# === R2 Bucket (backup storage) ===
[[r2_buckets]]
binding = "BACKUPS"
bucket_name = "echo-prime-backups"

# === Service Bindings ===
[[services]]
binding = "SHARED_BRAIN"
service = "echo-shared-brain"

[[services]]
binding = "SWARM_BRAIN"
service = "echo-swarm-brain"

# === Cron Triggers ===
[triggers]
crons = [
  "0 */6 * * *",   # Check scheduled backups every 6 hours
  "0 2 * * *",     # Nightly D1 backup of all fleet databases
  "0 3 * * 7",     # Weekly full fleet inventory (Sunday 3am UTC)
  "0 4 1 * *",     # Monthly retention cleanup (1st of month 4am UTC)
]

[vars]
WORKER_VERSION = "1.0.0"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "echo_metrics"
